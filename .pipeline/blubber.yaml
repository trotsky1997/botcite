version: v4
base: docker-registry.wikimedia.org/nodejs22-slim
lives:
  in: /srv/service
runs:
  environment: { APP_BASE_PATH: /srv/service, BUN_INSTALL: /root/.bun }

variants:
  build:
    base: docker-registry.wikimedia.org/nodejs22-slim
    copies: [local]
    apt: { packages: [git, curl, python-is-python3, pkg-config, build-essential] }
    node: { requirements: [package.json]}
    runs: { environment: { LINK: g++ } }
  development:
    includes: [build]
    entrypoint: [bash, -lc, "curl -fsSL https://bun.sh/install | bash && export PATH=/root/.bun/bin:$PATH && bun run start"]
  test:
    includes: [build]
    entrypoint: [bash, -lc, "curl -fsSL https://bun.sh/install | bash && export PATH=/root/.bun/bin:$PATH && bun run test"]
    runs: { insecurely: true }
  prep:
    includes: [build]
    node: { env: production }
  production:
    copies: [prep]
    node: { env: production }
    apt: { packages: [ca-certificates, curl] }
    entrypoint: [bash, -lc, "curl -fsSL https://bun.sh/install | bash && export PATH=/root/.bun/bin:$PATH && bun run start"]
